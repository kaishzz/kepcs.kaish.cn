<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KepCs 开水服 - 404</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <style>
      :root {
        color-scheme: dark;
        font-family: "MiSans VF", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #edf0f6;
        background:
          radial-gradient(circle at top left, rgba(99, 226, 182, 0.07), transparent 28%),
          linear-gradient(180deg, #0b0c10 0%, #111318 60%, #0d0f13 100%);
      }

      .card {
        width: min(520px, 100%);
        padding: 36px 32px;
        border-radius: 28px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: linear-gradient(180deg, rgba(24, 27, 33, 0.96), rgba(18, 21, 26, 0.96));
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.24);
      }

      .code {
        margin: 0 0 10px;
        color: #8a909d;
        font-size: 0.84rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2.1rem;
        line-height: 1.1;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: #c7ccd6;
      }

      a {
        margin-top: 24px;
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 24px;
        border-radius: 14px;
        color: #f4f8fb;
        text-decoration: none;
        background: rgba(56, 63, 74, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: border-color 180ms ease, box-shadow 180ms ease;
      }

      a:hover {
        border-color: rgba(127, 231, 196, 0.62);
        box-shadow: 0 0 0 1px rgba(127, 231, 196, 0.08), inset 0 0 0 1px rgba(127, 231, 196, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="code">404</p>
      <h1>页面不存在</h1>
      <p>你访问的地址当前不存在</p>
      <a href="/">返回主页</a>
    </main>
  </body>
</html>
